# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - mission13-bookstore-broc

on:
  push:
    branches:
      - phase-6
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build Mission11Assignment --configuration Release

      - name: dotnet publish
        run: dotnet publish Mission11Assignment -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Copy SQLite database
        run: cp Mission11Assignment/Bookstore.sqlite ${{env.DOTNET_ROOT}}/myapp/ || true

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_428FE3D78E384ED5877D9478F54826C8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8F2BFB226DCE4BF48FA641815CDFFB99 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C693BB3072D24B22A5A3703184284818 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'mission13-bookstore-broc'
          slot-name: 'Production'
          package: .
          